<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 蔡叔叔比薩屋</title>
    <style>
        :root { --primary: #2e7d32; --danger: #c62828; --bg: #f4f6f8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); min-height: 100vh; }

        /* PIN Screen */
        #pinScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
        #pinScreen h1 { font-size: 22px; color: #333; }
        #pinScreen p { color: #666; font-size: 14px; }
        .pin-input { padding: 12px 20px; font-size: 24px; letter-spacing: 8px; border: 2px solid #ccc; border-radius: 8px; text-align: center; width: 180px; outline: none; }
        .pin-input:focus { border-color: var(--primary); }
        .pin-error { color: var(--danger); font-size: 14px; min-height: 20px; }

        /* Admin Layout */
        #adminPanel { display: none; }
        .admin-header { background: #1b5e20; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 18px; }

        /* Buttons */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: opacity 0.15s; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: white; border: 1px solid #ccc; color: #333; }
        .btn-warn { background: #fff3e0; color: #e65100; }
        .btn-ok { background: #e8f5e9; color: #2e7d32; }
        .btn-sm { padding: 4px 10px; font-size: 13px; }

        /* Tabs */
        .tabs { background: white; border-bottom: 2px solid #e0e0e0; display: flex; overflow-x: auto; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; border-bottom: 3px solid transparent; color: #666; white-space: nowrap; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: bold; }

        /* Tab Content */
        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .section-header h2 { font-size: 18px; color: #333; }

        /* Table */
        .table-wrap { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f5f5f5; padding: 10px 12px; text-align: left; font-weight: bold; color: #555; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-inactive { background: #f5f5f5; color: #999; }
        .action-cell { display: flex; gap: 6px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { margin-bottom: 16px; font-size: 18px; color: #333; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .radio-group { display: flex; gap: 16px; flex-wrap: wrap; padding-top: 4px; }
        .radio-group label { display: flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer; font-size: 14px; }
        .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; font-size: 14px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        /* Cat / Sort lists */
        .card-list { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .card-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .card-item:last-child { border-bottom: none; }
        .sort-num { color: #bbb; font-size: 13px; width: 24px; flex-shrink: 0; }
        .sort-name { flex: 1; }
        .sort-cat { font-size: 12px; color: #999; margin-left: 6px; }

        /* Settings card */
        .settings-card { background: white; border-radius: 8px; padding: 20px; max-width: 400px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .settings-card h3 { margin-bottom: 14px; font-size: 16px; }

        /* Toast */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<!-- PIN Screen -->
<div id="pinScreen">
    <h1>🍕 蔡叔叔比薩屋</h1>
    <p>管理後台 — 請輸入 PIN 碼</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="4" inputmode="numeric" placeholder="••••" autofocus>
    <div class="pin-error" id="pinError"></div>
    <button class="btn btn-primary" onclick="checkPin()">進入後台</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel">
    <div class="admin-header">
        <h1>⚙️ 管理後台</h1>
        <button class="btn btn-outline btn-sm" onclick="logout()">登出</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('items')">品項管理</div>
        <div class="tab" onclick="switchTab('categories')">分類管理</div>
        <div class="tab" onclick="switchTab('sort')">排序管理</div>
        <div class="tab" onclick="switchTab('settings')">系統設定</div>
    </div>

    <!-- 品項管理 -->
    <div id="tab-items" class="tab-content active">
        <div class="section-header">
            <h2>品項管理</h2>
            <button class="btn btn-primary btn-sm" onclick="openAddItem()">＋ 新增品項</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>類別</th>
                        <th>名稱</th>
                        <th>單位</th>
                        <th>儲存方式</th>
                        <th>安全線</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 分類管理 -->
    <div id="tab-categories" class="tab-content">
        <div class="section-header">
            <h2>分類管理</h2>
            <button class="btn btn-primary btn-sm" onclick="openAddCategory()">＋ 新增分類</button>
        </div>
        <div class="card-list" id="categoryList"></div>
    </div>

    <!-- 排序管理 -->
    <div id="tab-sort" class="tab-content">
        <div class="section-header">
            <h2>排序管理</h2>
            <p style="font-size:13px;color:#999;">調整品項在員工介面的顯示順序</p>
        </div>
        <div class="card-list" id="sortList"></div>
    </div>

    <!-- 系統設定 -->
    <div id="tab-settings" class="tab-content">
        <div class="section-header"><h2>系統設定</h2></div>
        <div class="settings-card">
            <h3>修改 PIN 碼</h3>
            <div class="form-group">
                <label>目前 PIN 碼</label>
                <input type="password" id="currentPin" maxlength="4" inputmode="numeric" placeholder="輸入目前 PIN">
            </div>
            <div class="form-group">
                <label>新 PIN 碼（4位數字）</label>
                <input type="password" id="newPin" maxlength="4" inputmode="numeric" placeholder="輸入新 PIN">
            </div>
            <div class="form-group">
                <label>確認新 PIN 碼</label>
                <input type="password" id="confirmPin" maxlength="4" inputmode="numeric" placeholder="再次輸入新 PIN">
            </div>
            <button class="btn btn-primary" onclick="changePin()">確認修改</button>
        </div>
    </div>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="itemModal">
    <div class="modal">
        <h2 id="itemModalTitle">新增品項</h2>
        <input type="hidden" id="editItemId">
        <div class="form-group">
            <label>品項名稱 *</label>
            <input type="text" id="itemName" placeholder="例：豬絞肉 (熟/800g包)">
        </div>
        <div class="form-group">
            <label>類別 *</label>
            <select id="itemCategory"></select>
        </div>
        <div class="form-group">
            <label>單位 *</label>
            <input type="text" id="itemUnit" placeholder="例：包、袋、罐、顆">
        </div>
        <div class="form-group">
            <label>儲存方式 *</label>
            <div class="radio-group">
                <label><input type="radio" name="storageType" value="冷凍" checked> ❄️ 冷凍庫</label>
                <label><input type="radio" name="storageType" value="冷藏"> 🧊 冷藏庫</label>
                <label><input type="radio" name="storageType" value="常溫"> 📦 常溫倉庫</label>
            </div>
        </div>
        <div class="form-group">
            <label>安全線（低於此數量警示）</label>
            <input type="number" id="itemThreshold" value="5" min="0" step="any">
        </div>
        <div class="form-group">
            <label class="check-label">
                <input type="checkbox" id="itemActive" checked> 啟用此品項（停用後不顯示在員工介面）
            </label>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('itemModal')">取消</button>
            <button class="btn btn-primary" onclick="saveItem()">儲存</button>
        </div>
    </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal" style="max-width:360px;">
        <h2>新增分類</h2>
        <div class="form-group">
            <label>分類名稱</label>
            <input type="text" id="categoryName" placeholder="例：肉類">
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('categoryModal')">取消</button>
            <button class="btn btn-primary" onclick="saveCategory()">新增</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUYkvADtC6tM8uENRFNUb7OJlTUcisfFE",
        authDomain: "caishushu-inventory.firebaseapp.com",
        projectId: "caishushu-inventory",
        storageBucket: "caishushu-inventory.firebasestorage.app",
        messagingSenderId: "228644978060",
        appId: "1:228644978060:web:ac87081548d5a19305eaa9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const mainRef = doc(db, "inventory", "mainStore");
    const settingsRef = doc(db, "inventory", "settings");

    let inventoryData = [];
    let categories = [];
    let adminPin = '1234';
    let unsubscribeMain = null;

    const DEFAULT_CATEGORIES = ['肉類','海鮮','臘腸','薯條起司','蔬菜','罐頭類','飲料','粉','醬料','外帶醬料','包材','衛生用品','清潔用品'];

    // ── PIN ──────────────────────────────────────────
    async function loadSettings() {
        const snap = await getDoc(settingsRef);
        if (snap.exists()) {
            const d = snap.data();
            adminPin = d.adminPin || '1234';
            categories = d.categories || DEFAULT_CATEGORIES;
        } else {
            categories = [...DEFAULT_CATEGORIES];
            await setDoc(settingsRef, { adminPin: '1234', categories });
        }
    }

    window.checkPin = async function() {
        const entered = document.getElementById('pinInput').value;
        await loadSettings();
        if (entered === adminPin) {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            startAdmin();
        } else {
            document.getElementById('pinError').textContent = '❌ PIN 碼錯誤，請再試一次';
            document.getElementById('pinInput').value = '';
        }
    };

    document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.checkPin(); });

    window.logout = function() {
        if (unsubscribeMain) { unsubscribeMain(); unsubscribeMain = null; }
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('pinScreen').style.display = 'flex';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinError').textContent = '';
    };

    // ── INIT ─────────────────────────────────────────
    function startAdmin() {
        renderCategoryList();
        populateCategorySelect();
        unsubscribeMain = onSnapshot(mainRef, snap => {
            if (snap.exists()) {
                const items = snap.data().items || [];
                inventoryData = items.map((item, idx) => ({
                    storageType: '冷凍',
                    active: true,
                    sortOrder: idx,
                    ...item
                }));
            }
            renderItemsTable();
            renderSortList();
        });
    }

    // ── TABS ─────────────────────────────────────────
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    };

    // ── ITEMS TABLE ───────────────────────────────────
    function storageLabel(t) {
        return { '冷凍': '❄️ 冷凍', '冷藏': '🧊 冷藏', '常溫': '📦 常溫' }[t] || t || '—';
    }

    function renderItemsTable() {
        const sorted = [...inventoryData].sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
        document.getElementById('itemsTableBody').innerHTML = sorted.map(item => `
            <tr style="${item.active === false ? 'opacity:0.45;' : ''}">
                <td>${item.category}</td>
                <td><strong>${item.name}</strong></td>
                <td>${item.unit}</td>
                <td>${storageLabel(item.storageType)}</td>
                <td>${item.threshold}</td>
                <td><span class="badge ${item.active !== false ? 'badge-active' : 'badge-inactive'}">${item.active !== false ? '啟用' : '停用'}</span></td>
                <td>
                    <div class="action-cell">
                        <button class="btn btn-outline btn-sm" onclick="openEditItem(${item.id})">編輯</button>
                        <button class="btn btn-sm ${item.active !== false ? 'btn-warn' : 'btn-ok'}" onclick="toggleActive(${item.id})">${item.active !== false ? '停用' : '啟用'}</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // ── ITEM MODAL ────────────────────────────────────
    window.openAddItem = function() {
        document.getElementById('itemModalTitle').textContent = '新增品項';
        document.getElementById('editItemId').value = '';
        document.getElementById('itemName').value = '';
        document.getElementById('itemUnit').value = '';
        document.getElementById('itemThreshold').value = '5';
        document.getElementById('itemActive').checked = true;
        document.querySelector('input[name="storageType"][value="冷凍"]').checked = true;
        populateCategorySelect();
        openModal('itemModal');
    };

    window.openEditItem = function(id) {
        const item = inventoryData.find(i => i.id === id);
        if (!item) return;
        document.getElementById('itemModalTitle').textContent = '編輯品項';
        document.getElementById('editItemId').value = id;
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemUnit').value = item.unit;
        document.getElementById('itemThreshold').value = item.threshold;
        document.getElementById('itemActive').checked = item.active !== false;
        const radio = document.querySelector(`input[name="storageType"][value="${item.storageType || '冷凍'}"]`);
        if (radio) radio.checked = true;
        populateCategorySelect(item.category);
        openModal('itemModal');
    };

    window.saveItem = async function() {
        const name = document.getElementById('itemName').value.trim();
        const category = document.getElementById('itemCategory').value;
        const unit = document.getElementById('itemUnit').value.trim();
        const storageType = document.querySelector('input[name="storageType"]:checked').value;
        const threshold = parseFloat(document.getElementById('itemThreshold').value) || 0;
        const active = document.getElementById('itemActive').checked;
        const editId = document.getElementById('editItemId').value;

        if (!name || !unit) { showToast('請填寫名稱和單位'); return; }

        const snap = await getDoc(mainRef);
        const data = snap.exists() ? snap.data() : { items: [], logs: [] };
        const items = [...(data.items || [])];

        if (editId) {
            const idx = items.findIndex(i => i.id === parseInt(editId));
            if (idx !== -1) items[idx] = { ...items[idx], name, category, unit, storageType, threshold, active };
        } else {
            const newId = Math.max(0, ...items.map(i => i.id)) + 1;
            items.push({ id: newId, name, category, unit, storageType, threshold, active, sortOrder: items.length, freezerStock: 0, chillerStock: 0 });
        }

        await setDoc(mainRef, { ...data, items, lastUpdated: new Date().toISOString() });
        closeModal('itemModal');
        showToast(editId ? '品項已更新' : '品項已新增');
    };

    window.toggleActive = async function(id) {
        const snap = await getDoc(mainRef);
        const data = snap.exists() ? snap.data() : { items: [] };
        const items = [...(data.items || [])];
        const idx = items.findIndex(i => i.id === id);
        if (idx === -1) return;
        items[idx] = { ...items[idx], active: items[idx].active === false };
        await setDoc(mainRef, { ...data, items, lastUpdated: new Date().toISOString() });
        showToast(items[idx].active ? '品項已啟用' : '品項已停用');
    };

    // ── CATEGORIES ────────────────────────────────────
    function populateCategorySelect(selected) {
        document.getElementById('itemCategory').innerHTML =
            categories.map(c => `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`).join('');
    }

    function renderCategoryList() {
        document.getElementById('categoryList').innerHTML = categories.length
            ? categories.map(cat => `
                <div class="card-item">
                    <span>${cat}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteCategory('${cat}')">刪除</button>
                </div>`).join('')
            : '<div class="card-item" style="color:#999;">尚無分類</div>';
    }

    window.openAddCategory = function() {
        document.getElementById('categoryName').value = '';
        openModal('categoryModal');
    };

    window.saveCategory = async function() {
        const name = document.getElementById('categoryName').value.trim();
        if (!name) return;
        if (categories.includes(name)) { showToast('分類已存在'); return; }
        categories.push(name);
        await setDoc(settingsRef, { adminPin, categories });
        renderCategoryList();
        populateCategorySelect();
        closeModal('categoryModal');
        showToast('分類已新增');
    };

    window.deleteCategory = async function(cat) {
        if (inventoryData.some(i => i.category === cat && i.active !== false)) {
            showToast('此分類仍有啟用品項，無法刪除'); return;
        }
        if (!confirm(`確定刪除分類「${cat}」？`)) return;
        categories = categories.filter(c => c !== cat);
        await setDoc(settingsRef, { adminPin, categories });
        renderCategoryList();
        showToast('分類已刪除');
    };

    // ── SORT ─────────────────────────────────────────
    function renderSortList() {
        const sorted = [...inventoryData]
            .filter(i => i.active !== false)
            .sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
        document.getElementById('sortList').innerHTML = sorted.length
            ? sorted.map((item, idx) => `
                <div class="card-item">
                    <span class="sort-num">${idx + 1}</span>
                    <span class="sort-name">${item.name}<span class="sort-cat">${item.category}</span></span>
                    <button class="btn btn-outline btn-sm" ${idx === 0 ? 'disabled' : ''} onclick="moveItem(${item.id}, -1)">▲</button>
                    <button class="btn btn-outline btn-sm" ${idx === sorted.length - 1 ? 'disabled' : ''} onclick="moveItem(${item.id}, 1)">▼</button>
                </div>`).join('')
            : '<div class="card-item" style="color:#999;">尚無啟用品項</div>';
    }

    window.moveItem = async function(id, dir) {
        const sorted = [...inventoryData]
            .filter(i => i.active !== false)
            .sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
        const idx = sorted.findIndex(i => i.id === id);
        const swapIdx = idx + dir;
        if (idx < 0 || swapIdx < 0 || swapIdx >= sorted.length) return;

        const snap = await getDoc(mainRef);
        const data = snap.exists() ? snap.data() : { items: [] };
        const items = [...(data.items || [])];

        const a = items.find(i => i.id === sorted[idx].id);
        const b = items.find(i => i.id === sorted[swapIdx].id);
        if (a && b) {
            const tmp = a.sortOrder ?? idx;
            a.sortOrder = b.sortOrder ?? swapIdx;
            b.sortOrder = tmp;
        }
        await setDoc(mainRef, { ...data, items, lastUpdated: new Date().toISOString() });
    };

    // ── PIN CHANGE ────────────────────────────────────
    window.changePin = async function() {
        const current = document.getElementById('currentPin').value;
        const newP = document.getElementById('newPin').value;
        const conf = document.getElementById('confirmPin').value;
        if (current !== adminPin) { showToast('目前 PIN 碼錯誤'); return; }
        if (!/^\d{4}$/.test(newP)) { showToast('新 PIN 碼必須為 4 位數字'); return; }
        if (newP !== conf) { showToast('兩次輸入不一致'); return; }
        adminPin = newP;
        await setDoc(settingsRef, { adminPin, categories });
        ['currentPin','newPin','confirmPin'].forEach(id => document.getElementById(id).value = '');
        showToast('PIN 碼已更新');
    };

    // ── MODAL / TOAST HELPERS ─────────────────────────
    window.openModal = id => document.getElementById(id).classList.add('open');
    window.closeModal = id => document.getElementById(id).classList.remove('open');
    document.querySelectorAll('.modal-overlay').forEach(el =>
        el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
    );

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.style.display = 'none', 2500);
    }
    window.showToast = showToast;
</script>
</body>
</html>
