<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="蔡叔叔庫存">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <title>蔡叔叔比薩屋 - 庫存管理系統 v2</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-dark: #1b5e20;
            --transfer-color: #0288d1;
            --danger-color: #c62828;
            --warning-color: #ef6c00;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --line-color: #e0e4e2;
            --muted: #68756f;
            --soft-green: #edf7ed;
            --soft-blue: #e8f3fb;
            --soft-red: #fff1f1;
            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow: 0 8px 24px rgba(24, 48, 32, 0.10);
        }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top left, #e8f5e9 0, #f4f6f8 28%, #f4f6f8 100%);
            color: #26332d;
        }
        button, input, select, textarea { font: inherit; }
        button { touch-action: manipulation; }
        .app-shell { max-width: 1320px; margin: 0 auto; padding: 18px; }
        .hero {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.85);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 18px 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            position: sticky;
            top: 8px;
            z-index: 20;
            backdrop-filter: blur(14px);
        }
        h1 { margin: 0; color: var(--primary-dark); font-size: clamp(22px, 2.8vw, 32px); letter-spacing: 0.3px; }
        .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sync-status {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 7px 14px; border-radius: 999px; font-size: 13px;
            font-weight: 700; white-space: nowrap;
        }
        .sync-status .dot { width: 9px; height: 9px; border-radius: 50%; }
        .sync-syncing { background: #fff3e0; color: #e65100; }
        .sync-syncing .dot { background: #fb8c00; animation: pulse 1s infinite; }
        .sync-synced  { background: #e8f5e9; color: #2e7d32; }
        .sync-synced  .dot { background: #43a047; }
        .sync-failed  { background: #ffebee; color: #b71c1c; }
        .sync-failed  .dot { background: #c62828; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .nav-tabs { display: flex; gap: 8px; margin: 18px 0; overflow-x: auto; padding-bottom: 2px; }
        .nav-tab, .btn {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: #fff;
            color: #33433b;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--line-color);
        }
        .nav-tab.active, .btn-primary { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .btn-danger { background: var(--danger-color); color: #fff; border-color: var(--danger-color); }
        .btn-secondary { background: #607d8b; color: #fff; border-color: #607d8b; }
        .btn-ghost { background: transparent; box-shadow: none; color: var(--muted); border: 1px solid var(--line-color); }
        .btn-small { padding: 7px 11px; font-size: 13px; }
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.85);
        }
        .toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) auto; gap: 12px; align-items: center; margin-bottom: 14px; }
        .search-input, .field, select, textarea {
            width: 100%;
            border: 1px solid #cdd7d1;
            border-radius: 12px;
            padding: 10px 12px;
            background: #fff;
            color: #26332d;
            outline-color: var(--primary-color);
        }
        .filter-container { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 16px; }
        .filter-btn { padding: 7px 13px; border: 1px solid #c8d5cd; background: #fff; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 700; color: #42524a; }
        .filter-btn.active, .filter-btn:hover { background-color: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .alert-box { background-color: #ffebee; border-left: 5px solid #c62828; padding: 14px 16px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .alert-box ul { margin: 8px 0 0; padding-left: 20px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        th, td { padding: 12px 9px; border-bottom: 1px solid #e0e4e2; vertical-align: middle; }
        th { background-color: #f4f8f5; color: #41514a; position: sticky; top: 93px; z-index: 10; }
        td.name-cell { text-align: left; min-width: 190px; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 800; }
        .badge-muted { background: #f0f3f1; color: #60706a; }
        .badge-low { background: #ffebee; color: #c62828; }
        .badge-ok { background: #e8f5e9; color: #2e7d32; }
        .badge-off { background: #eceff1; color: #607d8b; }
        .stock-stack { display: grid; gap: 5px; text-align: left; }
        .stock-line { display: flex; justify-content: space-between; gap: 10px; border-radius: 9px; padding: 5px 8px; background: #f7faf8; }
        .stock-line strong { white-space: nowrap; }
        .low-stock { background-color: #fff8f8; }
        .inactive-row { opacity: 0.52; }
        .mobile-cards { display: none; }
        .item-card { border: 1px solid #e2e7e4; border-radius: 16px; padding: 14px; background: #fff; box-shadow: 0 3px 14px rgba(0,0,0,0.05); }
        .item-card + .item-card { margin-top: 12px; }
        .card-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
        .card-title { font-size: 17px; font-weight: 900; color: #24352c; }
        .card-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .location-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin: 10px 0; }
        .location-tile { background: #f7faf8; border: 1px solid #e2e8e4; border-radius: 12px; padding: 9px; min-height: 66px; }
        .location-tile .loc { color: #6a786f; font-size: 12px; font-weight: 700; }
        .location-tile .qty { margin-top: 4px; font-weight: 900; line-height: 1.35; }
        .log-container { max-height: 220px; overflow-y: auto; background: #fafafa; padding: 10px; font-size: 13px; margin-top: 10px; border: 1px solid #eee; border-radius: 12px; }
        .log-line { display: grid; grid-template-columns: 150px 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .log-line:last-child { border-bottom: 0; }
        .log-time { color: #8a9690; }
        .hidden { display: none !important; }
        .loading-text { text-align: center; padding: 34px; font-size: 18px; color: #666; }
        body.is-offline button[data-write="true"], body.is-offline input, body.is-offline select, body.is-offline textarea { opacity: 0.55; cursor: not-allowed; }

        .help { color: #7d8a83; font-size: 12px; line-height: 1.5; margin-top: 5px; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { border-radius: 999px; background: #eef5ef; border: 1px solid #d6e5da; padding: 7px 10px; display: inline-flex; gap: 8px; align-items: center; font-size: 13px; }
        .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(20px); background: #23352b; color: #fff; border-radius: 999px; padding: 10px 16px; opacity: 0; pointer-events: none; transition: all .22s ease; z-index: 200; box-shadow: var(--shadow); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 1280px) {
            .hero { grid-template-columns: 1fr; position: static; }
            .header-actions { justify-content: flex-start; }
            .toolbar { grid-template-columns: 1fr; }
            th { top: 0; }
        }
        @media (max-width: 680px) {
            .desktop-table { display: none; }
            .mobile-cards { display: block; }
            .count-table-wrap { display: none; }
            .count-cards-mobile { display: block; }
            .location-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 560px) {
            .app-shell { padding: 10px; }
            .panel, .hero { border-radius: 16px; padding: 14px; }
            .location-grid { grid-template-columns: 1fr; }
            .log-line { grid-template-columns: 1fr; gap: 2px; }
            .btn, .nav-tab { padding: 10px 13px; }
        }
        @media (display-mode: standalone) { .subtitle .pwa-hint { display: none; } }

        /* === Inline Card Action Panel === */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .card-act-btn { padding: 10px 6px; border-radius: 12px; font-size: 14px; font-weight: 800; background: #fff; cursor: pointer; transition: background 0.15s, color 0.15s; }
        .card-act-btn.act-consume { border: 1.5px solid var(--danger-color); color: var(--danger-color); }
        .card-act-btn.act-consume.active { background: var(--danger-color); color: #fff; }
        .card-act-btn.act-receive { border: 1.5px solid var(--primary-color); color: var(--primary-color); }
        .card-act-btn.act-receive.active { background: var(--primary-color); color: #fff; }
        .card-act-btn.act-prep { border: 1.5px solid #006064; color: #006064; }
        .card-act-btn.act-prep.active { background: #006064; color: #fff; }
        .card-act-btn.act-return { border: 1.5px solid var(--warning-color); color: var(--warning-color); }
        .card-act-btn.act-return.active { background: var(--warning-color); color: #fff; }
        .card-act-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .card-panel { margin-top: 10px; padding: 14px; background: #f7faf8; border-radius: 14px; border: 1px solid #d8e5dc; }
        .panel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .panel-label { font-size: 13px; font-weight: 800; color: #506059; white-space: nowrap; }
        .panel-loc-info { font-size: 14px; font-weight: 800; padding: 7px 13px; border-radius: 10px; }
        .panel-input { flex: 1; min-width: 80px; border: 1px solid #cdd7d1; border-radius: 10px; padding: 10px 12px; font-size: 16px; background: #fff; }
        .unit-chips { display: flex; gap: 6px; }
        .unit-chips label { display: inline-flex; align-items: center; padding: 7px 14px; border: 1.5px solid #cdd7d1; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; background: #fff; user-select: none; }
        .unit-chips label:has(input:checked) { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }
        .unit-chips input[type="radio"] { display: none; }
        .loc-chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .loc-chips label { display: inline-flex; flex-direction: column; align-items: center; padding: 8px 14px; border: 1.5px solid #cdd7d1; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; background: #fff; line-height: 1.4; user-select: none; white-space: nowrap; }
        .loc-chips label:has(input:checked) { background: var(--soft-blue); border-color: var(--transfer-color); color: var(--transfer-color); }
        .loc-chips input[type="radio"] { display: none; }
        .loc-sub { font-size: 11px; color: #8a9690; font-weight: 500; margin-top: 2px; }
        .loc-chips label:has(input:checked) .loc-sub { color: var(--transfer-color); }
        .panel-note { width: 100%; border: 1px solid #cdd7d1; border-radius: 10px; padding: 9px 12px; font-size: 14px; margin-bottom: 10px; background: #fff; }
        .panel-submit { width: 100%; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: 800; border: 0; cursor: pointer; }

        /* === Count (盤點) view === */
        .count-pin-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; text-align: center; }
        .count-pin-wrap h3 { margin: 0 0 8px; color: var(--primary-dark); font-size: 20px; }
        .count-pin-input { font-size: 22px; letter-spacing: 10px; text-align: center; border: 2px solid #cdd7d1; border-radius: 12px; padding: 12px 20px; width: 200px; background: #fff; }
        .count-items-grid { display: grid; gap: 14px; }
        .count-card { background: #fff; border: 1.5px solid #e2e7e4; border-radius: 16px; padding: 16px; }
        .count-card.count-dirty { border-color: #f59e0b; background: #fffdf0; }
        .count-card.count-confirmed { border-color: var(--primary-color); background: #f4fbf4; }
        .count-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .count-card-title { font-size: 16px; font-weight: 900; color: #24352c; }
        .count-loc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f3f1; flex-wrap: wrap; }
        .count-loc-row:last-of-type { border-bottom: 0; }
        .count-loc-name { font-size: 13px; color: #506059; font-weight: 800; width: 70px; flex-shrink: 0; }
        .count-loc-current { font-size: 12px; color: #9aaba3; width: 72px; flex-shrink: 0; }
        .count-loc-input { border: 1.5px solid #cdd7d1; border-radius: 10px; padding: 8px 12px; font-size: 16px; width: 100px; background: #fff; }
        .count-loc-input:focus { border-color: var(--primary-color); outline: none; }
        .count-loc-unit { font-size: 13px; color: #506059; }
        .count-confirm-btn { margin-top: 12px; width: 100%; padding: 11px; border-radius: 12px; font-weight: 800; border: 0; cursor: pointer; background: var(--primary-color); color: #fff; font-size: 15px; }
        .count-confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .count-table-wrap { }
        .count-cards-mobile { display: none; }
        .count-input-stack { display: grid; gap: 6px; }
        .count-input-row { display: flex; align-items: center; gap: 5px; }
        .count-input-label { font-size: 12px; color: #6a786f; font-weight: 700; width: 38px; flex-shrink: 0; }
        .count-table-input { width: 76px; border: 1.5px solid #cdd7d1; border-radius: 8px; padding: 6px 8px; font-size: 14px; background: #fff; }
        .count-table-input:focus { border-color: var(--primary-color); outline: none; }
        .count-input-unit { font-size: 12px; color: #8a9690; white-space: nowrap; }
        .count-table-confirm-btn { padding: 8px 14px; border: 0; border-radius: 10px; background: var(--primary-color); color: #fff; font-weight: 800; cursor: pointer; font-size: 13px; white-space: nowrap; }
        tr.count-dirty td { background: #fffdf0 !important; }
        tr.count-dirty .count-table-confirm-btn { background: #f59e0b; }
        tr.count-confirmed td { background: #f4fbf4 !important; }
        tr.count-confirmed .count-table-confirm-btn { background: #43a047; }
        /* === Quick action inline (table rows) === */
        .qact-input-wrap { display: flex; align-items: center; gap: 6px; }
        .qact-qty { width: 76px; border: 1.5px solid #cdd7d1; border-radius: 10px; padding: 8px 10px; font-size: 15px; background: #fff; text-align: center; }
        .qact-qty:focus { border-color: var(--primary-color); outline: none; }
        .qact-btns { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .qact-btn { padding: 7px 10px; border: 0; border-radius: 9px; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .qact-btn:disabled { opacity: 0.38; cursor: not-allowed; }
        .qact-receive { background: #e8f5e9; color: #2e7d32; }
        .qact-prep    { background: #e0f2f1; color: #006064; }
        .qact-consume { background: #ffebee; color: #c62828; }
        .qact-return  { background: #fff3e0; color: #e65100; }
        .qact-info    { background: transparent; border: 1px solid #cdd7d1; color: #7d8a83; padding: 6px 8px; border-radius: 8px; font-size: 13px; cursor: pointer; position: relative; }
        .info-pop { position: absolute; right: 0; top: calc(100% + 6px); background: #23352b; color: #fff; border-radius: 12px; padding: 10px 14px; font-size: 12px; line-height: 1.8; white-space: nowrap; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.22); }
        .info-pop::before { content: ""; position: absolute; top: -6px; right: 12px; border: 6px solid transparent; border-top: 0; border-bottom-color: #23352b; }
        td.qact-td { white-space: nowrap; }
    </style>
</head>
<body>
<div class="app-shell">
    <header class="hero">
        <div>
            <h1>🍕 蔡叔叔比薩屋 - 庫存管理 v2</h1>
            <p class="subtitle">平板優先・手機卡片式・多庫位・支援 g / 包換算・PWA <span class="pwa-hint">｜可加入主畫面</span></p>
        </div>
        <div class="header-actions">
            <div class="sync-status sync-syncing" id="syncStatus"><span class="dot"></span><span id="syncText">同步中…</span></div>
            <button class="btn btn-ghost btn-small" type="button" onclick="installPwaPrompt()">加入主畫面</button>
        </div>
    </header>

    <nav class="nav-tabs" aria-label="主要功能">
        <button class="nav-tab active" id="tabStock" type="button" onclick="openStockTab()">庫存操作</button>
        <button class="nav-tab" id="tabCount" type="button" onclick="openCountTab()">📋 盤點</button>
        <a href="admin2.html" class="nav-tab" style="text-decoration:none;">品項管理後台 ↗</a>
    </nav>

    <main id="stockView" class="panel">
        <div class="alert-box" id="alertBox">
            <strong style="color:#c62828;">⚠️ 叫貨提醒：</strong> 以下大倉區庫存低於安全線，請安排叫貨。
            <ul id="alertList"></ul>
        </div>

        <div class="toolbar">
            <input id="searchInput" class="search-input" type="search" placeholder="搜尋品項、分類或單位…" oninput="renderInventory()">
            <div class="chip-row">
                <label class="chip"><input id="showInactive" type="checkbox" onchange="renderInventory()"> 顯示停用品項</label>
            </div>
        </div>

        <div class="filter-container" id="filterContainer"></div>

        <div class="desktop-table">
            <table>
                <thead>
                    <tr>
                        <th style="width:6%;">類別</th>
                        <th style="text-align:left;width:16%;">食材 / 物品</th>
                        <th style="width:14%;">大倉</th>
                        <th style="width:12%;">備料</th>
                        <th style="width:10%;">提醒</th>
                        <th style="width:13%;">數量</th>
                        <th style="width:29%;">動作</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"><tr><td colspan="7" class="loading-text">🔄 正在載入資料庫，請稍候...</td></tr></tbody>
            </table>
        </div>
        <div id="mobileCards" class="mobile-cards"></div>

        <section style="margin-top:26px;border-top:2px dashed #dce3df;padding-top:14px;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
                <strong style="color:#43534b;">🕒 異動日誌</strong>
                <button class="btn btn-ghost btn-small" data-write="true" type="button" onclick="clearLogs()">清除紀錄</button>
            </div>
            <div class="log-container" id="logContainer"></div>
        </section>
    </main>

</div>


<main id="countView" class="panel hidden">
    <!-- PIN gate -->
    <div id="countPinOverlay" class="count-pin-wrap">
        <h3>🔒 請輸入盤點代碼</h3>
        <p style="color:#8a9690;font-size:13px;margin:0 0 18px;">盤點代碼可在品項管理後台 → 系統設定中修改</p>
        <input id="countPinInput" class="count-pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••"
            onkeydown="if(event.key==='Enter')verifyCountPin()">
        <button class="btn btn-primary" style="margin-top:14px;width:200px;" type="button" onclick="verifyCountPin()">進入盤點</button>
        <div id="countPinError" style="color:#c62828;margin-top:10px;font-size:14px;display:none;">代碼錯誤，請再試一次</div>
    </div>
    <!-- Count content -->
    <div id="countContent" class="hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
            <div>
                <strong style="font-size:18px;color:var(--primary-dark);">📋 庫存盤點</strong>
                <div style="font-size:13px;color:#8a9690;margin-top:4px;">輸入各倉位實際數量（顯示單位），確認後寫入系統</div>
            </div>
            <button class="btn btn-ghost btn-small" type="button" onclick="lockCount()">🔒 鎖定盤點</button>
        </div>
        <div id="countItems" class="count-items-grid"></div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { doc, setDoc, onSnapshot, runTransaction, initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

   
// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCUYkvADtC6tM8uENRFNUb7OJlTUcisfFE",
  authDomain: "caishushu-inventory.firebaseapp.com",
  projectId: "caishushu-inventory",
  storageBucket: "caishushu-inventory.firebasestorage.app",
  messagingSenderId: "228644978060",
  appId: "1:228644978060:web:ac87081548d5a19305eaa9"
};

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        experimentalAutoDetectLongPolling: true,
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });
    const docRef = doc(db, "inventory", "mainStore");

    const SCHEMA_VERSION = 2;
    const WAREHOUSE_KEYS = ["warehouseFrozen", "warehouseChilled", "warehouseRoom"];
    const PREP_KEYS      = ["onsiteChilled", "prep"];
    const STATION_KEYS   = ["pizzaStation", "chickenStation"];
    const LOCATION_DEFS = {
        warehouseFrozen:  { id: "warehouseFrozen",  name: "大倉冷凍", short: "冷凍", group: "大倉" },
        warehouseChilled: { id: "warehouseChilled", name: "大倉冷藏", short: "冷藏", group: "大倉" },
        warehouseRoom:    { id: "warehouseRoom",    name: "大倉常溫", short: "常溫", group: "大倉" },
        onsiteChilled:    { id: "onsiteChilled",    name: "解凍冷藏", short: "解凍", group: "備貨" },
        prep:             { id: "prep",             name: "其他備貨", short: "備貨", group: "備貨" },
        pizzaStation:     { id: "pizzaStation",     name: "比薩區",   short: "比薩", group: "使用區" },
        chickenStation:   { id: "chickenStation",   name: "炸雞區",   short: "炸雞", group: "使用區" },
    };

    let inventoryData = [];
    let logs = [];
    let settings = { categories: [], locations: Object.values(LOCATION_DEFS), countPin: "" };
    let currentCategoryFilter = "全部";
    let isOffline = false;
    let deferredInstallPrompt = null;

    function setSyncStatus(state) {
        const el = document.getElementById("syncStatus");
        const txt = document.getElementById("syncText");
        if (!el || !txt) return;
        el.classList.remove("sync-syncing", "sync-synced", "sync-failed");
        if (state === "syncing") {
            el.classList.add("sync-syncing"); txt.textContent = "同步中…";
        } else if (state === "synced") {
            el.classList.add("sync-synced"); txt.textContent = "✓ 已同步";
        } else {
            el.classList.add("sync-failed"); txt.textContent = "⚠ 連線失敗，僅供檢視";
        }
    }

    function setLocked(locked) {
        if (locked === isOffline) return;
        isOffline = locked;
        document.body.classList.toggle("is-offline", locked);
        renderAll();
    }

    function guardOnline() {
        if (isOffline) {
            alert("⚠️ 目前與雲端連線失敗，無法編輯。\n請確認網路後重試，以免庫存沒有真正寫入。");
            return false;
        }
        return true;
    }

    function normalizeNumber(v, fallback = 0) {
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
    }

    function inferUnitProfile(item) {
        const unit = item.unit || item.displayUnit || "個";
        const name = item.name || "";
        const m = name.match(/(\d+(?:\.\d+)?)\s*(g|ml|公克|毫升)\s*(?:包|袋|瓶|盒|桶)?/i);
        if (m) {
            const baseUnit = m[2].toLowerCase().includes("ml") || m[2].includes("毫") ? "ml" : "g";
            return { displayUnit: unit, baseUnit, basePerDisplay: normalizeNumber(m[1], 1), allowBaseInput: true };
        }
        return { displayUnit: unit, baseUnit: unit, basePerDisplay: 1, allowBaseInput: false };
    }

    function inferDefaultLocations(item) {
        const st = item.storageType || "常溫";
        if (st === "冷凍") return { receive: "warehouseFrozen",  return: "warehouseFrozen"  };
        if (st === "冷藏") return { receive: "warehouseChilled", return: "warehouseChilled" };
        return                   { receive: "warehouseRoom",     return: "warehouseRoom"     };
    }

    function normalizeItem(raw, index = 0) {
        const item = { ...raw };
        const unitProfile = inferUnitProfile(item);
        item.id = item.id ?? Date.now() + index;
        item.category = item.category || "未分類";
        item.name = item.name || "未命名品項";
        item.active = item.active !== false;
        item.sortOrder = normalizeNumber(item.sortOrder, index + 1);
        item.displayUnit = item.displayUnit || unitProfile.displayUnit;
        item.baseUnit = item.baseUnit || unitProfile.baseUnit;
        item.basePerDisplay = normalizeNumber(item.basePerDisplay, unitProfile.basePerDisplay || 1);
        item.allowBaseInput = item.allowBaseInput ?? unitProfile.allowBaseInput;
        item.enableThaw     = item.enableThaw     === true;
        item.enableReturn   = item.enableReturn   === true;
        item.primaryStation = item.primaryStation || "pizzaStation";
        const locationMeta = inferDefaultLocations(item);
        item.defaultReceiveLocation  = item.defaultReceiveLocation  || locationMeta.receive;
        item.defaultReturnLocation   = item.defaultReturnLocation   || locationMeta.return  || item.defaultReceiveLocation;
        item.defaultIssueLocation    = item.defaultIssueLocation    || (item.enableThaw ? "onsiteChilled" : item.defaultReceiveLocation);
        item.defaultConsumeLocation  = item.defaultConsumeLocation  || "prep";
        if (!Array.isArray(item.allowedLocations) || !item.allowedLocations.length) {
            item.allowedLocations = [item.defaultReceiveLocation, ...(item.enableThaw ? ["onsiteChilled"] : []), "prep", item.primaryStation];
        }
        item.locations = { ...(item.locations || {}) };
        Object.keys(LOCATION_DEFS).forEach(key => {
            item.locations[key] = normalizeNumber(item.locations[key], 0);
        });
        item.thresholdDisplay = normalizeNumber(raw.thresholdDisplay ?? raw.threshold ?? 0, 0);
        item.thresholdBase = normalizeNumber(item.thresholdBase, item.thresholdDisplay * item.basePerDisplay);
        return item;
    }

    function normalizeItems(items) {
        return (items || []).map(normalizeItem).sort((a,b) => (a.sortOrder - b.sortOrder) || String(a.name).localeCompare(String(b.name), "zh-Hant"));
    }

    function sumLocations(item, keys) {
        return keys.reduce((sum, key) => sum + normalizeNumber(item.locations?.[key], 0), 0);
    }

    function itemStockKeys(item) {
        const keys = [...WAREHOUSE_KEYS];
        const consumeKey = item.defaultConsumeLocation || 'prep';
        if (!keys.includes(consumeKey)) keys.push(consumeKey);
        if (item.enableThaw) {
            const issueKey = item.defaultIssueLocation;
            if (issueKey && !keys.includes(issueKey)) keys.push(issueKey);
        }
        return keys;
    }

    function getAllCategories() {
        const set = new Set(["全部"]);
        (settings.categories || []).forEach(c => c && set.add(c));
        inventoryData.forEach(i => i.category && set.add(i.category));
        return [...set];
    }

    function toDisplayQty(item, baseQty) {
        const per = normalizeNumber(item.basePerDisplay, 1) || 1;
        return roundQty(baseQty / per);
    }

    function roundQty(n) {
        return parseFloat((normalizeNumber(n, 0)).toFixed(3));
    }

    function formatQty(item, baseQty, options = {}) {
        const base = roundQty(baseQty);
        const display = toDisplayQty(item, baseQty);
        if (item.baseUnit !== item.displayUnit && item.basePerDisplay !== 1) {
            if (options.compact) return `${display} ${item.displayUnit}`;
            return `${display} ${item.displayUnit} / ${base} ${item.baseUnit}`;
        }
        return `${base} ${item.baseUnit}`;
    }

    function qtyToBase(item, val, unit) {
        const n = normalizeNumber(val, NaN);
        if (!Number.isFinite(n) || n <= 0) return NaN;
        if (unit === item.displayUnit && item.displayUnit !== item.baseUnit) return n * item.basePerDisplay;
        return n;
    }

    function escapeHtml(str) {
        return String(str ?? "").replace(/[&<>'"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[s]));
    }

    function showToast(text) {
        const toast = document.getElementById("toast");
        toast.textContent = text;
        toast.classList.add("show");
        window.clearTimeout(showToast._timer);
        showToast._timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    onSnapshot(docRef, { includeMetadataChanges: true }, (docSnap) => {
        setLocked(false);
        const meta = docSnap.metadata;
        setSyncStatus(meta.hasPendingWrites || meta.fromCache ? "syncing" : "synced");
        if (docSnap.exists()) {
            const data = docSnap.data();
            settings = { categories: [], locations: Object.values(LOCATION_DEFS), ...(data.settings || {}) };
            inventoryData = normalizeItems(data.items || []);
            logs = Array.isArray(data.logs) ? data.logs : [];
        } else {
            inventoryData = [];
            settings = { categories: [], locations: Object.values(LOCATION_DEFS) };
        }
        renderAll();
    }, (error) => {
        console.error("讀取資料失敗:", error);
        setSyncStatus("failed");
        setLocked(true);
        if (inventoryData.length === 0) {
            document.getElementById("inventoryBody").innerHTML = `<tr><td colspan="8" class="loading-text" style="color:red;">❌ 無法連接到資料庫，請檢查網路。</td></tr>`;
        }
    });

    function saveWholeDocument() {
        const items = normalizeItems(inventoryData);
        setDoc(docRef, {
            schemaVersion: SCHEMA_VERSION,
            items,
            logs,
            settings: { ...settings, categories: getAllCategories().filter(c => c !== "全部") },
            lastUpdated: new Date().toISOString()
        }).catch(error => alert("資料儲存遇到問題，請稍後再試：" + error.message));
    }

    async function runStockTransaction(mutate, options = {}) {
        if (!guardOnline()) return;
        try {
            await runTransaction(db, async (tx) => {
                const snap = await tx.get(docRef);
                const data = snap.exists() ? snap.data() : { items: [], logs: [], settings: {} };
                const items = normalizeItems(data.items || []);
                let txLogs = Array.isArray(data.logs) ? [...data.logs] : [];
                const txSettings = { categories: [], locations: Object.values(LOCATION_DEFS), ...(data.settings || {}) };
                const result = mutate(items, txLogs, txSettings);
                if (result === false) return;
                if (txLogs.length > 100) txLogs = txLogs.slice(0, 100);
                tx.set(docRef, {
                    schemaVersion: SCHEMA_VERSION,
                    items: normalizeItems(items),
                    logs: txLogs,
                    settings: txSettings,
                    lastUpdated: new Date().toISOString()
                });
            });
            if (!options.silent) showToast("已寫入並同步庫存");
        } catch (error) {
            alert("操作未完成（可能因其他裝置同時操作），請再試一次：" + error.message);
        }
    }

    function pushLog(txLogs, text, meta = {}) {
        const now = new Date();
        txLogs.unshift({
            id: `${now.getTime()}-${Math.random().toString(36).slice(2, 8)}`,
            time: now.toLocaleString("zh-TW", { hour12: false }),
            text,
            ...meta
        });
    }

    function filteredItems() {
        const q = document.getElementById("searchInput")?.value.trim().toLowerCase() || "";
        const showInactive = document.getElementById("showInactive")?.checked || false;
        return inventoryData.filter(item => {
            if (!showInactive && item.active === false) return false;
            if (currentCategoryFilter !== "全部" && item.category !== currentCategoryFilter) return false;
            if (!q) return true;
            return [item.name, item.category, item.displayUnit, item.baseUnit].join(" ").toLowerCase().includes(q);
        });
    }

    function renderAll() {
        renderFilters();
        renderInventory();
    }

    function renderFilters() {
        const wrap = document.getElementById("filterContainer");
        if (!wrap) return;
        const cats = getAllCategories();
        if (!cats.includes(currentCategoryFilter)) currentCategoryFilter = "全部";
        wrap.innerHTML = cats.map(cat => `<button class="filter-btn ${cat === currentCategoryFilter ? "active" : ""}" type="button" onclick="filterCategory('${escapeHtml(cat)}')">${escapeHtml(cat)}</button>`).join("");
        const datalist = document.getElementById("categoryList");
        if (datalist) datalist.innerHTML = cats.filter(c => c !== "全部").map(c => `<option value="${escapeHtml(c)}"></option>`).join("");
    }

    function lowStockItems() {
        return inventoryData.filter(item => item.active !== false && sumLocations(item, itemStockKeys(item)) <= item.thresholdBase);
    }

    function renderInventory() {
        const tbody = document.getElementById("inventoryBody");
        const mobile = document.getElementById("mobileCards");
        const alertBox = document.getElementById("alertBox");
        const alertList = document.getElementById("alertList");
        const items = filteredItems();
        const lows = lowStockItems();
        if (lows.length > 0) {
            alertList.innerHTML = lows.map(item => `<li>【${escapeHtml(item.category)}】${escapeHtml(item.name)}：總庫存剩餘 <strong>${formatQty(item, sumLocations(item, itemStockKeys(item)))}</strong>，安全線 ${formatQty(item, item.thresholdBase)}</li>`).join("");
            alertBox.style.display = "block";
        } else {
            alertBox.style.display = "none";
        }
        if (!items.length) {
            tbody.innerHTML = `<tr><td colspan="8" class="loading-text">沒有符合條件的品項</td></tr>`;
            mobile.innerHTML = `<div class="loading-text">沒有符合條件的品項</div>`;
            renderLogs();
            return;
        }
        tbody.innerHTML = items.map(renderTableRow).join("");
        mobile.innerHTML = items.map(renderMobileCard).join("");
        Object.entries(cardPanelState).forEach(([itemId, type]) => {
            if (!type) return;
            const item = inventoryData.find(i => String(i.id) === String(itemId));
            if (!item) return;
            document.getElementById(`actbtn-${type}-${itemId}`)?.classList.add("active");
            const panel = document.getElementById(`card-panel-${itemId}`);
            if (panel) { panel.innerHTML = renderCardPanel(item, type); panel.classList.remove("hidden"); }
        });
        renderLogs();
    }

    function renderTableRow(item) {
        const warehouseBase = sumLocations(item, itemStockKeys(item));
        const isLow = item.active !== false && warehouseBase <= item.thresholdBase;
        const dis = item.active === false ? "disabled" : "";
        const hasBase = item.allowBaseInput && item.baseUnit !== item.displayUnit;
        const unitChips = [item.displayUnit, ...(hasBase ? [item.baseUnit] : [])].map((u, i) =>
            `<label><input type="radio" name="qact-unit-${item.id}" value="${escapeHtml(u)}" ${i === 0 ? "checked" : ""}>${escapeHtml(u)}</label>`
        ).join("");
        const receiveLoc  = LOCATION_DEFS[item.defaultReceiveLocation]?.short || item.defaultReceiveLocation;
        const issueLoc    = LOCATION_DEFS[item.defaultIssueLocation]?.short   || item.defaultIssueLocation;
        const consumeFrom = LOCATION_DEFS[item.defaultConsumeLocation]?.short || item.defaultConsumeLocation;
        const retLoc      = LOCATION_DEFS[item.defaultReturnLocation]?.short  || item.defaultReturnLocation || receiveLoc;
        const infoLines = [
            `入庫 → ${receiveLoc}`,
            ...(item.enableThaw ? [`備料 ${receiveLoc} → ${issueLoc}`] : []),
            `消耗 ${consumeFrom} → 出庫`,
            ...(item.enableReturn ? [`回放 ${consumeFrom} → ${retLoc}`] : []),
        ];
        return `
            <tr class="${isLow ? "low-stock" : ""} ${item.active === false ? "inactive-row" : ""}">
                <td><span class="badge badge-muted">${escapeHtml(item.category)}</span></td>
                <td class="name-cell"><strong>${escapeHtml(item.name)}</strong><div class="help">${escapeHtml(item.basePerDisplay)} ${escapeHtml(item.baseUnit)} = 1 ${escapeHtml(item.displayUnit)}</div></td>
                <td>${renderLocationStack(item, WAREHOUSE_KEYS)}</td>
                <td>${item.enableThaw ? renderSingleLocationCell(item, item.defaultIssueLocation) : '<div class="stock-stack" style="color:#ccc;font-size:12px;">—</div>'}</td>
                <td>${item.active === false
                    ? '<span class="badge badge-off">停用</span>'
                    : isLow
                        ? `<span class="badge badge-low">⚠️ 補貨</span><div style="font-size:11px;color:#9aaba3;margin-top:3px;">安全線 ${formatQty(item, item.thresholdBase, { compact: true })}</div>`
                        : `<span class="badge badge-ok">✅ 充足</span><div style="font-size:11px;color:#9aaba3;margin-top:3px;">安全線 ${formatQty(item, item.thresholdBase, { compact: true })}</div>`}
                </td>
                <td>
                    <div class="qact-input-wrap">
                        <input class="qact-qty" id="qact-qty-${item.id}" type="number" min="0" step="any" inputmode="decimal" placeholder="0" ${dis}>
                        <div class="unit-chips">${unitChips}</div>
                    </div>
                </td>
                <td class="qact-td">
                    <div class="qact-btns">
                        <button class="qact-btn qact-receive" type="button" ${dis} onclick="execQuickAction(${item.id},'receive')">入庫</button>
                        ${item.enableThaw ? `<button class="qact-btn qact-prep" type="button" ${dis} onclick="execQuickAction(${item.id},'prep')">備料</button>` : ""}
                        <button class="qact-btn qact-consume" type="button" ${dis} onclick="execQuickAction(${item.id},'consume')">消耗</button>
                        ${item.enableReturn ? `<button class="qact-btn qact-return" type="button" ${dis} onclick="execQuickAction(${item.id},'return')">回放</button>` : ""}
                        <div style="position:relative;display:inline-block;">
                            <button class="qact-info" type="button" onclick="toggleInfoPop(event,${item.id})">ℹ️</button>
                            <div class="info-pop hidden" id="info-pop-${item.id}">${infoLines.map(l => escapeHtml(l)).join("<br>")}</div>
                        </div>
                    </div>
                </td>
            </tr>`;
    }

    function renderLocationStack(item, keys) {
        const allowed = item.allowedLocations || [];
        const filtered = keys.filter(k => allowed.includes(k));
        if (!filtered.length) return '<div class="stock-stack" style="color:#ccc;font-size:12px;">—</div>';
        return `<div class="stock-stack">${filtered.map(key => `<div class="stock-line"><span>${LOCATION_DEFS[key].short}</span><strong>${formatQty(item, normalizeNumber(item.locations?.[key], 0), { compact: true })}</strong></div>`).join("")}</div>`;
    }

    function renderSingleLocationCell(item, key) {
        const def = LOCATION_DEFS[key];
        if (!def) return '<div class="stock-stack" style="color:#ccc;font-size:12px;">—</div>';
        return `<div class="stock-stack"><div class="stock-line"><span>${def.short}</span><strong>${formatQty(item, normalizeNumber(item.locations?.[key], 0), { compact: true })}</strong></div></div>`;
    }

    function renderMobileCard(item) {
        const warehouseBase = sumLocations(item, itemStockKeys(item));
        const isLow = item.active !== false && warehouseBase <= item.thresholdBase;
        const prepKeys = item.enableThaw && item.defaultIssueLocation ? [item.defaultIssueLocation] : [];
        const locKeys = [...WAREHOUSE_KEYS, ...prepKeys].filter((key, i, arr) =>
            arr.indexOf(key) === i && LOCATION_DEFS[key] &&
            (item.allowedLocations.includes(key) || normalizeNumber(item.locations?.[key], 0) > 0));
        const dis = item.active === false ? "disabled" : "";
        return `
            <article class="item-card ${item.active === false ? "inactive-row" : ""}">
                <div class="card-head">
                    <div><div class="card-title">${escapeHtml(item.name)}</div><div class="card-meta">${escapeHtml(item.category)}｜${escapeHtml(item.basePerDisplay)} ${escapeHtml(item.baseUnit)} = 1 ${escapeHtml(item.displayUnit)}</div></div>
                    ${item.active === false ? '<span class="badge badge-off">停用</span>' : isLow ? '<span class="badge badge-low">補貨</span>' : '<span class="badge badge-ok">充足</span>'}
                </div>
                <div class="location-grid">${locKeys.map(key => `<div class="location-tile"><div class="loc">${LOCATION_DEFS[key].name}</div><div class="qty">${formatQty(item, normalizeNumber(item.locations?.[key], 0))}</div></div>`).join("")}</div>
                <div class="card-actions">
                    <button class="card-act-btn act-receive" id="actbtn-receive-${item.id}" type="button" ${dis} onclick="toggleCardAction(${item.id},'receive')">📦 入庫</button>
                    ${item.enableThaw ? `<button class="card-act-btn act-prep" id="actbtn-prep-${item.id}" type="button" ${dis} onclick="toggleCardAction(${item.id},'prep')">🍕 備料</button>` : ""}
                    <button class="card-act-btn act-consume" id="actbtn-consume-${item.id}" type="button" ${dis} onclick="toggleCardAction(${item.id},'consume')">📤 消耗</button>
                    ${item.enableReturn ? `<button class="card-act-btn act-return" id="actbtn-return-${item.id}" type="button" ${dis} onclick="toggleCardAction(${item.id},'return')">↩️ 回放</button>` : ""}
                </div>
                <div class="card-panel hidden" id="card-panel-${item.id}"></div>
            </article>`;
    }

    window.execQuickAction = function(itemId, type) {
        if (!guardOnline()) return;
        const item = inventoryData.find(i => String(i.id) === String(itemId));
        if (!item) return;
        if (type === "return" && !confirm("請確認此品項為完整包裝、未開封，且仍符合保存條件。\n已開封或分裝後的剩餘量不可回放。")) return;
        const qtyVal = document.getElementById(`qact-qty-${itemId}`)?.value;
        const unit = document.querySelector(`input[name="qact-unit-${itemId}"]:checked`)?.value || item.displayUnit;
        runStockTransaction((items, txLogs) => {
            const it = items.find(i => String(i.id) === String(itemId));
            if (!it) { alert("找不到此品項，請重新整理。"); return false; }
            const baseQty = roundQty(qtyToBase(it, qtyVal, unit));
            if (!Number.isFinite(baseQty) || baseQty <= 0) { alert("請輸入大於 0 的數量。"); return false; }
            const qtyText  = formatQty(it, baseQty);
            const recLoc   = it.defaultReceiveLocation;
            const retLoc   = it.defaultReturnLocation || recLoc;
            const station  = it.primaryStation || "pizzaStation";
            if (type === "receive") {
                it.locations[recLoc] = roundQty(normalizeNumber(it.locations[recLoc], 0) + baseQty);
                pushLog(txLogs, `📦 進貨入庫：【${it.name}】${LOCATION_DEFS[recLoc].name} +${qtyText}`, { itemId: it.id, actionType: type, baseQty, toLocation: recLoc });
            } else if (type === "prep") {
                const fromLoc = recLoc;
                const toLoc   = it.defaultIssueLocation || "onsiteChilled";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[toLoc]   = roundQty(normalizeNumber(it.locations[toLoc], 0) + baseQty);
                pushLog(txLogs, `🍕 備料：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[toLoc]?.name || toLoc}，${qtyText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: toLoc });
            } else if (type === "consume") {
                const fromLoc = it.defaultConsumeLocation || "prep";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[station] = roundQty(normalizeNumber(it.locations[station], 0) + baseQty);
                pushLog(txLogs, `📤 消耗：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[station]?.name || station}，${qtyText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: station });
            } else if (type === "return") {
                const fromLoc = it.defaultConsumeLocation || "prep";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[retLoc]  = roundQty(normalizeNumber(it.locations[retLoc], 0) + baseQty);
                pushLog(txLogs, `↩️ 回放：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[retLoc]?.name || retLoc}，${qtyText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: retLoc });
            }
        }).then(() => {
            const inp = document.getElementById(`qact-qty-${itemId}`);
            if (inp) inp.value = "";
        });
    };

    window.toggleInfoPop = function(event, itemId) {
        event.stopPropagation();
        const pop = document.getElementById(`info-pop-${itemId}`);
        if (!pop) return;
        const isHidden = pop.classList.contains("hidden");
        document.querySelectorAll(".info-pop").forEach(p => p.classList.add("hidden"));
        if (isHidden) pop.classList.remove("hidden");
    };
    document.addEventListener("click", () => {
        document.querySelectorAll(".info-pop").forEach(p => p.classList.add("hidden"));
    });

    const cardPanelState = {};

    window.toggleCardAction = function(itemId, type) {
        if (!guardOnline()) return;
        const item = inventoryData.find(i => String(i.id) === String(itemId));
        if (!item) return;
        const panel = document.getElementById(`card-panel-${itemId}`);
        if (!panel) return;
        const current = cardPanelState[itemId];
        ["receive", "prep", "consume", "return"].forEach(t => document.getElementById(`actbtn-${t}-${itemId}`)?.classList.remove("active"));
        if (current === type) {
            cardPanelState[itemId] = null;
            panel.classList.add("hidden");
            panel.innerHTML = "";
            return;
        }
        cardPanelState[itemId] = type;
        document.getElementById(`actbtn-${type}-${itemId}`)?.classList.add("active");
        panel.innerHTML = renderCardPanel(item, type);
        panel.classList.remove("hidden");
        panel.querySelector(".panel-qty-input")?.focus();
    };

    function renderCardPanel(item, type) {
        const hasBase = item.allowBaseInput && item.baseUnit !== item.displayUnit;
        const unitChips = [item.displayUnit, ...(hasBase ? [item.baseUnit] : [])].map((u, i) =>
            `<label><input type="radio" name="card-unit-${item.id}" value="${escapeHtml(u)}" ${i === 0 ? "checked" : ""}>${escapeHtml(u)}</label>`
        ).join("");

        const qtyRow = `
            <div class="panel-row">
                <span class="panel-label">數量</span>
                <input class="panel-input panel-qty-input" id="card-qty-${item.id}" type="number" min="0" step="any" inputmode="decimal" placeholder="0">
                <div class="unit-chips">${unitChips}</div>
            </div>
            <input class="panel-note" type="text" id="card-note-${item.id}" placeholder="備註（選填）">`;

        if (type === "receive") {
            const loc = LOCATION_DEFS[item.defaultReceiveLocation];
            return `
                <div class="panel-row"><span class="panel-label">入庫至</span><span class="panel-loc-info" style="background:#e8f5e9;color:#2e7d32;">${loc?.name || item.defaultReceiveLocation}</span></div>
                ${qtyRow}
                <button class="panel-submit" type="button" style="background:#2e7d32;color:#fff;" onclick="submitCardAction(${item.id},'receive')">✅ 確認入庫</button>`;
        }

        if (type === "prep") {
            const fromDef = LOCATION_DEFS[item.defaultReceiveLocation];
            const toDef   = LOCATION_DEFS[item.defaultIssueLocation] || LOCATION_DEFS["onsiteChilled"];
            return `
                <div class="panel-row"><span class="panel-label">備料</span><span class="panel-loc-info" style="background:#e0f2f1;color:#006064;">${fromDef?.name || item.defaultReceiveLocation}</span><span style="font-size:12px;color:#999;">→</span><span class="panel-loc-info" style="background:#e8f5e9;color:#2e7d32;">${toDef?.name}</span></div>
                ${qtyRow}
                <button class="panel-submit" type="button" style="background:#006064;color:#fff;" onclick="submitCardAction(${item.id},'prep')">🍕 確認備料</button>`;
        }

        if (type === "consume") {
            const fromKey = item.defaultConsumeLocation || "prep";
            const fromDef = LOCATION_DEFS[fromKey];
            const staDef  = LOCATION_DEFS[item.primaryStation] || LOCATION_DEFS["pizzaStation"];
            return `
                <div class="panel-row"><span class="panel-label">消耗</span><span class="panel-loc-info" style="background:#ffebee;color:#c62828;">${fromDef?.name || fromKey}</span><span style="font-size:12px;color:#999;">→</span><span class="panel-loc-info" style="background:#fff3e0;color:#e65100;">${staDef?.name}</span></div>
                ${qtyRow}
                <button class="panel-submit" type="button" style="background:#c62828;color:#fff;" onclick="submitCardAction(${item.id},'consume')">📤 確認消耗</button>`;
        }

        if (type === "return") {
            const fromKey = item.defaultConsumeLocation || "prep";
            const fromDef = LOCATION_DEFS[fromKey];
            const retKey  = item.defaultReturnLocation || item.defaultReceiveLocation;
            const retDef  = LOCATION_DEFS[retKey];
            return `
                <div class="panel-row"><span class="panel-label">回放</span><span class="panel-loc-info" style="background:#fff3e0;color:#e65100;">${fromDef?.name || fromKey}</span><span style="font-size:12px;color:#999;">→</span><span class="panel-loc-info" style="background:#e8f5e9;color:#2e7d32;">${retDef?.name || retKey}</span></div>
                <p style="font-size:12px;color:#c62828;margin:6px 0 0;line-height:1.5;">⚠️ 僅限完整包裝、未開封且符合保存條件的品項</p>
                ${qtyRow}
                <button class="panel-submit" type="button" style="background:#e65100;color:#fff;" onclick="submitCardAction(${item.id},'return')">↩️ 確認回放</button>`;
        }
        return "";
    }

    window.submitCardAction = function(itemId, type) {
        if (!guardOnline()) return;
        const item = inventoryData.find(i => String(i.id) === String(itemId));
        if (!item) return;
        const qtyVal  = document.getElementById(`card-qty-${itemId}`)?.value;
        const noteVal = document.getElementById(`card-note-${itemId}`)?.value.trim() || "";
        const unit    = document.querySelector(`input[name="card-unit-${itemId}"]:checked`)?.value || item.displayUnit;

        runStockTransaction((items, txLogs) => {
            const it = items.find(i => String(i.id) === String(itemId));
            if (!it) { alert("找不到此品項，請重新整理。"); return false; }
            const baseQty = roundQty(qtyToBase(it, qtyVal, unit));
            if (!Number.isFinite(baseQty) || baseQty <= 0) { alert("請輸入大於 0 的數量。"); return false; }
            const qtyText  = formatQty(it, baseQty);
            const noteText = noteVal ? `｜${noteVal}` : "";
            const recLoc   = it.defaultReceiveLocation;
            const retLoc   = it.defaultReturnLocation || recLoc;
            const station  = it.primaryStation || "pizzaStation";
            if (type === "receive") {
                it.locations[recLoc] = roundQty(normalizeNumber(it.locations[recLoc], 0) + baseQty);
                pushLog(txLogs, `📦 進貨入庫：【${it.name}】${LOCATION_DEFS[recLoc]?.name || recLoc} +${qtyText}${noteText}`, { itemId: it.id, actionType: type, baseQty, toLocation: recLoc });
            } else if (type === "prep") {
                const fromLoc = recLoc;
                const toLoc   = it.defaultIssueLocation || "onsiteChilled";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[toLoc]   = roundQty(normalizeNumber(it.locations[toLoc], 0) + baseQty);
                pushLog(txLogs, `🍕 備料：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[toLoc]?.name || toLoc}，${qtyText}${noteText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: toLoc });
            } else if (type === "consume") {
                const fromLoc = it.defaultConsumeLocation || "prep";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[station] = roundQty(normalizeNumber(it.locations[station], 0) + baseQty);
                pushLog(txLogs, `📤 消耗：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[station]?.name || station}，${qtyText}${noteText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: station });
            } else if (type === "return") {
                const fromLoc = it.defaultConsumeLocation || "prep";
                if (normalizeNumber(it.locations[fromLoc], 0) < baseQty) { alert(`${LOCATION_DEFS[fromLoc]?.name || fromLoc} 存量不足。`); return false; }
                it.locations[fromLoc] = roundQty(it.locations[fromLoc] - baseQty);
                it.locations[retLoc]  = roundQty(normalizeNumber(it.locations[retLoc], 0) + baseQty);
                pushLog(txLogs, `↩️ 回放：【${it.name}】${LOCATION_DEFS[fromLoc]?.name || fromLoc} → ${LOCATION_DEFS[retLoc]?.name || retLoc}，${qtyText}${noteText}`, { itemId: it.id, actionType: type, baseQty, fromLocation: fromLoc, toLocation: retLoc });
            }
        }).then(() => {
            cardPanelState[itemId] = null;
            ["receive", "prep", "consume", "return"].forEach(t => document.getElementById(`actbtn-${t}-${itemId}`)?.classList.remove("active"));
            const panel = document.getElementById(`card-panel-${itemId}`);
            if (panel) { panel.classList.add("hidden"); panel.innerHTML = ""; }
        });
    };

    function renderLogs() {
        const container = document.getElementById("logContainer");
        if (!logs.length) {
            container.innerHTML = '<div style="text-align:center;color:#9aa6a0;">暫無紀錄</div>';
            return;
        }
        container.innerHTML = logs.slice(0, 80).map(l => `<div class="log-line"><span class="log-time">${escapeHtml(l.time || "")}</span><span>${escapeHtml(l.text || "")}</span></div>`).join("");
    }

    window.filterCategory = function(cat) {
        currentCategoryFilter = cat;
        renderInventory();
        renderFilters();
    };


    window.clearLogs = function() {
        if (!guardOnline()) return;
        if (!confirm("確定要清除所有紀錄嗎？所有連線設備都會同步清除。")) return;
        runStockTransaction((items, txLogs) => { txLogs.length = 0; });
    };

    window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
    });
    // ── Tab switching ──────────────────────────────────────────
    window.openStockTab = function() {
        document.getElementById("tabStock")?.classList.add("active");
        document.getElementById("tabCount")?.classList.remove("active");
        document.getElementById("stockView")?.classList.remove("hidden");
        document.getElementById("countView")?.classList.add("hidden");
    };

    let countUnlocked = false;

    window.openCountTab = function() {
        document.getElementById("tabCount")?.classList.add("active");
        document.getElementById("tabStock")?.classList.remove("active");
        document.getElementById("stockView")?.classList.add("hidden");
        document.getElementById("countView")?.classList.remove("hidden");
        if (countUnlocked) {
            renderCountItems();
        } else {
            document.getElementById("countPinOverlay")?.classList.remove("hidden");
            document.getElementById("countContent")?.classList.add("hidden");
            setTimeout(() => document.getElementById("countPinInput")?.focus(), 80);
        }
    };

    window.verifyCountPin = function() {
        const input = document.getElementById("countPinInput")?.value || "";
        const pin = settings.countPin || settings.adminPin || "1234";
        if (input === pin) {
            countUnlocked = true;
            document.getElementById("countPinOverlay").classList.add("hidden");
            document.getElementById("countContent").classList.remove("hidden");
            document.getElementById("countPinError").style.display = "none";
            document.getElementById("countPinInput").value = "";
            renderCountItems();
        } else {
            document.getElementById("countPinError").style.display = "block";
            document.getElementById("countPinInput").value = "";
            document.getElementById("countPinInput").focus();
        }
    };

    window.lockCount = function() {
        countUnlocked = false;
        document.getElementById("countPinOverlay").classList.remove("hidden");
        document.getElementById("countContent").classList.add("hidden");
        document.getElementById("countPinInput").value = "";
    };

    function renderCountLocInputs(item, keys) {
        const allowed = item.allowedLocations || [];
        const filtered = keys.filter(k => allowed.includes(k));
        if (!filtered.length) return '<div style="color:#ccc;font-size:12px;text-align:center;">—</div>';
        return `<div class="count-input-stack">${filtered.map(key => {
            const currentDisplay = toDisplayQty(item, normalizeNumber(item.locations?.[key], 0));
            return `<div class="count-input-row">
                <span class="count-input-label">${LOCATION_DEFS[key].short}</span>
                <input class="count-table-input" type="number" min="0" step="any" inputmode="decimal"
                    id="count-t-${item.id}-${key}" value="${currentDisplay}" oninput="markCountDirty(${item.id})">
                <span class="count-input-unit">${escapeHtml(item.displayUnit)}</span>
            </div>`;
        }).join("")}</div>`;
    }

    function renderCountItems() {
        const container = document.getElementById("countItems");
        if (!container) return;
        const items = inventoryData.filter(i => i.active !== false);
        if (!items.length) { container.innerHTML = '<div class="loading-text">沒有可盤點的品項</div>'; return; }

        const tableRows = items.map(item => `
            <tr id="count-tr-${item.id}">
                <td><span class="badge badge-muted">${escapeHtml(item.category)}</span></td>
                <td class="name-cell"><strong>${escapeHtml(item.name)}</strong><div class="help">${escapeHtml(item.basePerDisplay)} ${escapeHtml(item.baseUnit)} = 1 ${escapeHtml(item.displayUnit)}</div></td>
                <td>${renderCountLocInputs(item, WAREHOUSE_KEYS)}</td>
                <td>${renderCountLocInputs(item, PREP_KEYS)}</td>
                <td>${renderCountLocInputs(item, STATION_KEYS)}</td>
                <td><button class="count-table-confirm-btn" type="button" onclick="submitItemCount(${item.id})">✓ 確認</button></td>
            </tr>`).join("");

        const cards = items.map(item => {
            const locRows = (item.allowedLocations || []).map(key => {
                const currentDisplay = toDisplayQty(item, normalizeNumber(item.locations?.[key], 0));
                return `<div class="count-loc-row">
                    <span class="count-loc-name">${LOCATION_DEFS[key].short}</span>
                    <span class="count-loc-current">現：${currentDisplay} ${escapeHtml(item.displayUnit)}</span>
                    <input class="count-loc-input" type="number" min="0" step="any" inputmode="decimal"
                        id="count-c-${item.id}-${key}" value="${currentDisplay}" oninput="markCountDirty(${item.id})">
                    <span class="count-loc-unit">${escapeHtml(item.displayUnit)}</span>
                </div>`;
            }).join("");
            return `<div class="count-card" id="count-card-${item.id}">
                <div class="count-card-head">
                    <div><div class="count-card-title">${escapeHtml(item.name)}</div>
                    <div style="font-size:12px;color:#8a9690;margin-top:2px;">${escapeHtml(item.category)}｜以 ${escapeHtml(item.displayUnit)} 為單位輸入</div></div>
                    <span class="badge badge-muted">${escapeHtml(item.category)}</span>
                </div>
                ${locRows}
                <button class="count-confirm-btn" type="button" onclick="submitItemCount(${item.id})">✓ 確認此品項</button>
            </div>`;
        }).join("");

        container.innerHTML = `
            <div class="count-table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:8%">類別</th>
                        <th style="text-align:left;width:20%">食材 / 物品</th>
                        <th style="width:22%">大倉</th>
                        <th style="width:22%">備貨</th>
                        <th style="width:13%">使用區</th>
                        <th style="width:15%">確認</th>
                    </tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
            </div>
            <div class="count-cards-mobile count-items-grid">${cards}</div>`;
    }

    window.markCountDirty = function(itemId) {
        const card = document.getElementById(`count-card-${itemId}`);
        if (card) { card.classList.add("count-dirty"); card.classList.remove("count-confirmed"); }
        const tr = document.getElementById(`count-tr-${itemId}`);
        if (tr) { tr.classList.add("count-dirty"); tr.classList.remove("count-confirmed"); }
    };

    window.submitItemCount = function(itemId) {
        if (!guardOnline()) return;
        const item = inventoryData.find(i => String(i.id) === String(itemId));
        if (!item) return;
        const allowed = item.allowedLocations || [];
        const useTable = window.innerWidth > 680;
        const prefix = useTable ? `count-t-${itemId}-` : `count-c-${itemId}-`;
        const newVals = {};
        for (const key of allowed) {
            const raw = document.getElementById(`${prefix}${key}`)?.value ?? "";
            const n = normalizeNumber(raw, NaN);
            if (!Number.isFinite(n) || n < 0) {
                alert(`【${LOCATION_DEFS[key]?.name || key}】數量無效，請輸入 0 或正數。`);
                return;
            }
            newVals[key] = roundQty(item.displayUnit !== item.baseUnit ? n * item.basePerDisplay : n);
        }
        runStockTransaction((items, txLogs) => {
            const it = items.find(i => String(i.id) === String(itemId));
            if (!it) { alert("找不到此品項，請重新整理。"); return false; }
            const changes = [];
            for (const key of allowed) {
                const oldBase = roundQty(normalizeNumber(it.locations?.[key], 0));
                const newBase = newVals[key];
                if (Math.abs(newBase - oldBase) < 0.001) continue;
                const oldTxt = formatQty(it, oldBase, { compact: true });
                const newTxt = formatQty(it, newBase, { compact: true });
                const diffBase = roundQty(newBase - oldBase);
                const diffTxt = (diffBase > 0 ? "+" : "-") + formatQty(it, Math.abs(diffBase), { compact: true });
                it.locations[key] = newBase;
                changes.push(`${LOCATION_DEFS[key]?.short || key}：${oldTxt} → ${newTxt}（${diffTxt}）`);
            }
            if (!changes.length) { showToast("數量無變動，未寫入"); return false; }
            pushLog(txLogs, `📋 盤點修正：【${it.name}】${changes.join("，")}`, { itemId: it.id, actionType: "count" });
        }).then(() => {
            const card = document.getElementById(`count-card-${itemId}`);
            if (card) { card.classList.remove("count-dirty"); card.classList.add("count-confirmed"); }
            const tr = document.getElementById(`count-tr-${itemId}`);
            if (tr) { tr.classList.remove("count-dirty"); tr.classList.add("count-confirmed"); }
        });
    };

    window.installPwaPrompt = async function() {
        if (!deferredInstallPrompt) {
            showToast("可使用瀏覽器分享選單加入主畫面");
            return;
        }
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
    };

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./sw.js").catch(err => console.warn("Service Worker 註冊失敗", err));
        });
    }

    window.__inventoryDebug = { normalizeItem, formatQty, LOCATION_DEFS };
</script>
